# LinuxUtilities presenter profile for distro Gromit-MPX releases.
# Install with: ./install_gromit_profile.sh
# Compatible with Ubuntu/Debian package builds such as 1.5.x.
# (Advanced shape profile is in config/gromit-mpx-advanced.cfg)

HOTKEY = "F6";
UNDOKEY = "F5";

"Cyan Pen" = PEN (size=6 color="#00d4ff");
"Red Pen" = "Cyan Pen" (color="#ff4d4d");
"Yellow Marker" = PEN (size=14 minsize=14 maxsize=14 color="yellow");
"Arrow Pen" = PEN (size=6 color="#60a5fa" arrowsize=2);
"Fine Pen" = PEN (size=3 color="#9b5de5");
"Eraser" = ERASER (size=80);

# Default drawing tool map while paint mode is active:
"default" = "Cyan Pen";
"default"[SHIFT] = "Yellow Marker";
"default"[CONTROL] = "Arrow Pen";
"default"[ALT] = "Red Pen";
"default"[2] = "Fine Pen";
"default"[Button3] = "Eraser";
