# LinuxUtilities presenter profile for newer Gromit-MPX releases.
# Install with: GROMIT_PROFILE_MODE=advanced ./install_gromit_profile.sh
# Hotkeys are aligned with this repo's AwesomeWM setup.

HOTKEY = "F6";
UNDOKEY = "F5";

"Cyan Pen" = PEN (size=6 color="#00d4ff");
"Red Pen" = "Cyan Pen" (color="#ff4d4d");
"Yellow Marker" = PEN (size=16 minsize=16 maxsize=16 color="rgba(255, 214, 102, 0.38)");
"Eraser" = ERASER (size=80);

"Guide Line" = LINE (size=5 color="#38bdf8");
"Arrow Line" = LINE (size=5 color="#60a5fa" arrowsize=2 arrowtype=end);
"Rectangle" = RECT (size=4 color="#ff8fab");
"Circle" = CIRCLE (size=4 color="#9b5de5");
"Filled Circle" = CIRCLE (size=3 color="#1f2937" fillcolor="rgba(99, 102, 241, 0.35)");
"Smooth Path" = SMOOTH (size=5 color="#06d6a0" simplify=10 snap=28);
"Ortho Path" = ORTHOGONAL (size=4 color="#f15bb5" simplify=12 radius=16 minlen=42 snap=30);

# Default drawing tool map while paint mode is active:
# - hold modifiers while dragging to switch tool on demand.
"default" = "Cyan Pen";
"default"[SHIFT] = "Yellow Marker";
"default"[CONTROL] = "Guide Line";
"default"[CONTROL,SHIFT] = "Arrow Line";
"default"[ALT] = "Rectangle";
"default"[ALT,SHIFT] = "Circle";
"default"[ALT,CONTROL] = "Filled Circle";
"default"[Button2] = "Smooth Path";
"default"[Button2,SHIFT] = "Ortho Path";
"default"[Button3] = "Eraser";
