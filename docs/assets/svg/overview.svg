<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#232323"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>
  <rect width="920" height="320" rx="16" fill="url(#bgGrad)" stroke="#454545" stroke-width="1"/>
  <rect width="920" height="4" fill="#ffb400"/>

  <!-- Title -->
  <text x="460" y="55" text-anchor="middle" fill="#ffffff" font-family="Inter,sans-serif" font-size="26" font-weight="700">Linux Utilities</text>
  <text x="460" y="80" text-anchor="middle" fill="#ffb400" font-family="Inter,sans-serif" font-size="14">Workflow Automation · AwesomeWM · Presenter Tools</text>

  <!-- Tool boxes -->
  <g transform="translate(40, 110)">
    <!-- Row of tool cards -->
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#32323280" stroke="#ffb40044"/>
    <text x="80" y="25" text-anchor="middle" fill="#ffb400" font-family="monospace" font-size="12" font-weight="700">🖱 Spotlight</text>
    <text x="80" y="45" text-anchor="middle" fill="#b0b0b0" font-family="Inter,sans-serif" font-size="10">X11 cursor overlay</text>
    <text x="80" y="62" text-anchor="middle" fill="#808080" font-family="monospace" font-size="9">cursor_spotlight.c</text>

    <rect x="185" y="0" width="160" height="80" rx="8" fill="#32323280" stroke="#47b47544"/>
    <text x="265" y="25" text-anchor="middle" fill="#47b475" font-family="monospace" font-size="12" font-weight="700">🎨 Presenter</text>
    <text x="265" y="45" text-anchor="middle" fill="#b0b0b0" font-family="Inter,sans-serif" font-size="10">Gromit drawing + dash</text>
    <text x="265" y="62" text-anchor="middle" fill="#808080" font-family="monospace" font-size="9">presenter_dash.sh</text>

    <rect x="370" y="0" width="160" height="80" rx="8" fill="#32323280" stroke="#07adf844"/>
    <text x="450" y="25" text-anchor="middle" fill="#07adf8" font-family="monospace" font-size="12" font-weight="700">🖥 Control Center</text>
    <text x="450" y="45" text-anchor="middle" fill="#b0b0b0" font-family="Inter,sans-serif" font-size="10">GTK desktop app</text>
    <text x="450" y="62" text-anchor="middle" fill="#808080" font-family="monospace" font-size="9">linux_control_center.c</text>

    <rect x="555" y="0" width="160" height="80" rx="8" fill="#32323280" stroke="#bc8cff44"/>
    <text x="635" y="25" text-anchor="middle" fill="#bc8cff" font-family="monospace" font-size="12" font-weight="700">⌨ DSL Launcher</text>
    <text x="635" y="45" text-anchor="middle" fill="#b0b0b0" font-family="Inter,sans-serif" font-size="10">GTK from .gdsl files</text>
    <text x="635" y="62" text-anchor="middle" fill="#808080" font-family="monospace" font-size="9">gtk_dsl_demo.c</text>

    <rect x="740" y="0" width="160" height="80" rx="8" fill="#32323280" stroke="#ffb40044"/>
    <text x="820" y="25" text-anchor="middle" fill="#ffb400" font-family="monospace" font-size="12" font-weight="700">⚙ AwesomeWM</text>
    <text x="820" y="45" text-anchor="middle" fill="#b0b0b0" font-family="Inter,sans-serif" font-size="10">rc.lua config</text>
    <text x="820" y="62" text-anchor="middle" fill="#808080" font-family="monospace" font-size="9">rc.lua</text>
  </g>

  <!-- Bottom bar -->
  <text x="460" y="240" text-anchor="middle" fill="#808080" font-family="Inter,sans-serif" font-size="11">Pure C + Bash + Lua — zero npm, zero bloat</text>

  <!-- Tech badges -->
  <g transform="translate(260, 260)">
    <rect x="0" y="0" width="50" height="22" rx="11" fill="#ffb40022" stroke="#ffb40055"/>
    <text x="25" y="15" text-anchor="middle" fill="#ffb400" font-family="monospace" font-size="10">C</text>
    <rect x="60" y="0" width="60" height="22" rx="11" fill="#47b47522" stroke="#47b47555"/>
    <text x="90" y="15" text-anchor="middle" fill="#47b475" font-family="monospace" font-size="10">Bash</text>
    <rect x="130" y="0" width="60" height="22" rx="11" fill="#07adf822" stroke="#07adf855"/>
    <text x="160" y="15" text-anchor="middle" fill="#07adf8" font-family="monospace" font-size="10">GTK4</text>
    <rect x="200" y="0" width="60" height="22" rx="11" fill="#bc8cff22" stroke="#bc8cff55"/>
    <text x="230" y="15" text-anchor="middle" fill="#bc8cff" font-family="monospace" font-size="10">Lua</text>
    <rect x="270" y="0" width="60" height="22" rx="11" fill="#f8514922" stroke="#f8514955"/>
    <text x="300" y="15" text-anchor="middle" fill="#f85149" font-family="monospace" font-size="10">X11</text>
  </g>
</svg>
